<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroStrike Sports Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070909;
        --panel: #101313;
        --card: #141818;
        --neon: #39ff88;
        --neon-soft: rgba(57, 255, 136, 0.2);
        --alarm: #ff3f5f;
        --text: #e3f8eb;
        --muted: #95b7a2;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #111616 0%, var(--bg) 55%);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
      }
      .dashboard {
        max-width: 1280px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1.9fr 1fr;
        gap: 16px;
      }
      .panel {
        background: linear-gradient(180deg, var(--panel), #0b0e0e);
        border: 1px solid #23312a;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .video-panel {
        padding: 16px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .title {
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        color: var(--neon);
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid #2d4537;
        border-radius: 10px;
        background: #1a2320;
        color: var(--text);
        font-weight: 600;
        padding: 10px 14px;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--neon);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #startBtn {
        background: #173625;
        border-color: #2f855f;
      }
      .stage {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #22392d;
        background: black;
      }
      video {
        width: 100%;
        max-height: 62vh;
        display: block;
      }
      canvas#overlayCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.92;
      }
      .chart-panel {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #203329;
        background: #0c1010;
      }
      .chart-title {
        font-size: 0.92rem;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .metrics-panel {
        padding: 16px;
        display: grid;
        grid-template-rows: repeat(5, min-content);
        gap: 12px;
        align-content: start;
      }
      .metric-card {
        background: var(--card);
        border: 1px solid #24392e;
        border-radius: 12px;
        padding: 12px;
      }
      .label {
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .value {
        margin-top: 4px;
        font-size: 1.45rem;
        font-weight: 700;
      }
      .muted-indicator {
        color: #ffd166;
      }
      .status-ok {
        color: var(--neon);
      }
      .status-alarm {
        color: var(--alarm);
      }
      .status-neutral {
        color: #ffd166;
      }
      @media (max-width: 980px) {
        .dashboard {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <section class="panel video-panel">
        <div class="header">
          <div class="title">NeuroStrike Training Console</div>
          <div class="actions">
            <button id="startBtn">Start Training</button>
            <button id="stopBtn" disabled>Stop</button>
            <button id="muteBtn" disabled>Mute</button>
          </div>
        </div>
        <div class="stage">
          <video id="video" playsinline muted></video>
          <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="chart-panel">
          <div class="chart-title">Posture Consistency (0-100)</div>
          <canvas id="scoreChart"></canvas>
        </div>
      </section>

      <aside class="panel metrics-panel">
        <div class="metric-card">
          <div class="label">Status</div>
          <div id="status" class="value status-ok">IDLE</div>
        </div>
        <div class="metric-card">
          <div class="label">Latency</div>
          <div id="latency" class="value">- ms</div>
        </div>
        <div class="metric-card">
          <div class="label">Posture Score</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="metric-card">
          <div class="label">Session Time</div>
          <div id="sessionTime" class="value">00:00</div>
        </div>
        <div class="metric-card">
          <div class="label">Audio</div>
          <div id="muteIndicator" class="value">ON</div>
        </div>
      </aside>
    </div>

    <script>
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const muteBtn = document.getElementById("muteBtn");
      const muteIndicator = document.getElementById("muteIndicator");
      const statusEl = document.getElementById("status");
      const latencyEl = document.getElementById("latency");
      const scoreEl = document.getElementById("score");
      const sessionTimeEl = document.getElementById("sessionTime");
      const video = document.getElementById("video");
      const overlayCanvas = document.getElementById("overlayCanvas");
      const overlayCtx = overlayCanvas.getContext("2d");
      const captureCanvas = document.createElement("canvas");
      const captureCtx = captureCanvas.getContext("2d");
      const chartCanvas = document.getElementById("scoreChart");

      let ws;
      let audioCtx;
      let oscillator;
      let gainNode;
      let streamRunning = false;
      let sendingInFlight = false;
      let reconnectTimer = null;
      let isMuted = false;
      let sessionStartTs = null;
      let sessionTicker = null;
      let scoreChart;

      const targetFps = 12;
      const frameIntervalMs = Math.floor(1000 / targetFps);
      const indexToName = {
        11: "LEFT_SHOULDER",
        12: "RIGHT_SHOULDER",
        13: "LEFT_ELBOW",
        14: "RIGHT_ELBOW",
        15: "LEFT_WRIST",
        16: "RIGHT_WRIST",
        23: "LEFT_HIP",
        24: "RIGHT_HIP",
      };
      const skeletalConnections = [
        [11, 12],
        [11, 13],
        [13, 15],
        [12, 14],
        [14, 16],
        [11, 23],
        [12, 24],
        [23, 24],
      ];

      function formatDuration(ms) {
        const totalSec = Math.floor(ms / 1000);
        const min = String(Math.floor(totalSec / 60)).padStart(2, "0");
        const sec = String(totalSec % 60).padStart(2, "0");
        return `${min}:${sec}`;
      }

      function setStatus(text, isAlarm, isNeutral = false) {
        statusEl.textContent = text;
        statusEl.className = `value ${isNeutral ? "status-neutral" : isAlarm ? "status-alarm" : "status-ok"}`;
      }

      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = "sawtooth";
        oscillator.frequency.value = 220;
        gainNode.gain.value = 0.0001;
        oscillator.connect(gainNode).connect(audioCtx.destination);
        oscillator.start();
      }

      async function ensureAudioReady() {
        initAudio();
        if (audioCtx && audioCtx.state !== "running") await audioCtx.resume();
      }

      function updateMuteUi() {
        muteBtn.textContent = isMuted ? "Unmute" : "Mute";
        muteIndicator.textContent = isMuted ? "MUTED" : "ON";
        muteIndicator.className = `value ${isMuted ? "muted-indicator" : "status-ok"}`;
      }

      function playFeedback(isAlarm, isNeutral = false) {
        if (!audioCtx || !oscillator || !gainNode) return;
        const now = audioCtx.currentTime;
        oscillator.frequency.cancelScheduledValues(now);
        gainNode.gain.cancelScheduledValues(now);
        if (isMuted || isNeutral || !isAlarm) {
          gainNode.gain.setTargetAtTime(0.0001, now, 0.02);
          return;
        }
        oscillator.frequency.setValueAtTime(890, now);
        gainNode.gain.setTargetAtTime(0.18, now, 0.01);
      }

      function initChart() {
        scoreChart = new Chart(chartCanvas, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Posture Consistency",
                data: [],
                borderColor: "#39ff88",
                backgroundColor: "rgba(57,255,136,0.15)",
                tension: 0.28,
                pointRadius: 0,
                borderWidth: 2,
                fill: true,
              },
            ],
          },
          options: {
            animation: false,
            responsive: true,
            scales: {
              x: {
                ticks: { color: "#8ea99a" },
                grid: { color: "rgba(255,255,255,0.04)" },
              },
              y: {
                min: 0,
                max: 100,
                ticks: { color: "#8ea99a" },
                grid: { color: "rgba(255,255,255,0.06)" },
              },
            },
            plugins: {
              legend: { labels: { color: "#9fd8b5" } },
            },
          },
        });
      }

      function resetSessionStats() {
        sessionStartTs = Date.now();
        sessionTimeEl.textContent = "00:00";
        scoreEl.textContent = "0";
        latencyEl.textContent = "- ms";
        if (scoreChart) {
          scoreChart.data.labels = [];
          scoreChart.data.datasets[0].data = [];
          scoreChart.update("none");
        }
      }

      function appendScore(score) {
        if (!scoreChart) return;
        const elapsedSec = Math.floor((Date.now() - sessionStartTs) / 1000);
        scoreChart.data.labels.push(elapsedSec.toString());
        scoreChart.data.datasets[0].data.push(score);
        if (scoreChart.data.labels.length > 80) {
          scoreChart.data.labels.shift();
          scoreChart.data.datasets[0].data.shift();
        }
        scoreChart.update("none");
      }

      function drawSkeleton(points, isAlarm) {
        const color = isAlarm ? "rgba(255, 63, 95, 0.75)" : "rgba(57, 255, 136, 0.75)";
        const indexedLandmarks = {};
        Object.entries(indexToName).forEach(([idx, name]) => {
          if (points[name]) indexedLandmarks[Number(idx)] = points[name];
        });

        overlayCtx.lineWidth = 3;
        overlayCtx.strokeStyle = color;
        overlayCtx.fillStyle = color;
        overlayCtx.shadowBlur = 10;
        overlayCtx.shadowColor = color;

        skeletalConnections.forEach(([a, b]) => {
          const p1 = indexedLandmarks[a];
          const p2 = indexedLandmarks[b];
          if (!p1 || !p2) return;
          overlayCtx.beginPath();
          overlayCtx.moveTo(p1.x, p1.y);
          overlayCtx.lineTo(p2.x, p2.y);
          overlayCtx.stroke();
        });

        Object.values(indexedLandmarks).forEach((pt) => {
          overlayCtx.beginPath();
          overlayCtx.arc(pt.x, pt.y, 4.5, 0, Math.PI * 2);
          overlayCtx.fill();
        });
        overlayCtx.shadowBlur = 0;
      }

      function getWsUrl() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        return `${proto}://${location.host}/ws`;
      }

      function connectWebSocket() {
        if (!streamRunning) return;
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

        setStatus("CONNECTING", false, true);
        ws = new WebSocket(getWsUrl());

        ws.onopen = () => setStatus("READY", false);
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          const rtt = data.client_ts ? Date.now() - data.client_ts : 0;
          latencyEl.textContent = `${rtt} ms`;
          const score = Number(data.posture_consistency_score ?? 0);
          scoreEl.textContent = String(Math.round(score));
          appendScore(score);

          const status = String(data.status || "").toUpperCase();
          const isAlarm = status === "ALARM" || status === "BAD";
          const isNeutral = status === "NO_POSE" || status === "CALIBRATING" || status === "CONNECTING";
          setStatus(status, isAlarm, isNeutral);
          playFeedback(isAlarm, isNeutral);
          lastResult = data;
          sendingInFlight = false;
        };
        ws.onclose = () => {
          if (!streamRunning) return;
          setStatus("DISCONNECTED", true, true);
          sendingInFlight = false;
          reconnectTimer = setTimeout(connectWebSocket, 1500);
        };
        ws.onerror = () => setStatus("ERROR", true, true);
      }

      async function sendFrameLoop() {
        while (streamRunning) {
          const t0 = performance.now();
          if (ws && ws.readyState === WebSocket.OPEN && !sendingInFlight) {
            sendingInFlight = true;
            const clientTs = Date.now();
            captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            const frameData = captureCanvas.toDataURL("image/jpeg", 0.55);
            ws.send(JSON.stringify({ frame: frameData, client_ts: clientTs }));
          }
          const elapsed = performance.now() - t0;
          await new Promise((resolve) => setTimeout(resolve, Math.max(0, frameIntervalMs - elapsed)));
        }
      }

      function startSessionClock() {
        if (sessionTicker) clearInterval(sessionTicker);
        sessionTicker = setInterval(() => {
          if (!streamRunning || !sessionStartTs) return;
          sessionTimeEl.textContent = formatDuration(Date.now() - sessionStartTs);
        }, 500);
      }

      async function startTraining() {
        resetSessionStats();
        await ensureAudioReady();
        updateMuteUi();

        if (streamRunning) return;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        muteBtn.disabled = false;
        setStatus("STARTING", false, true);

        const media = await navigator.mediaDevices.getUserMedia({
          video: { width: 960, height: 540, facingMode: "user" },
          audio: false,
        });
        video.srcObject = media;
        await video.play();

        const width = video.videoWidth || 960;
        const height = video.videoHeight || 540;
        overlayCanvas.width = width;
        overlayCanvas.height = height;
        captureCanvas.width = width;
        captureCanvas.height = height;

        streamRunning = true;
        startSessionClock();
        requestAnimationFrame(drawLoop);
        sendFrameLoop();
        connectWebSocket();
      }

      function stopTraining() {
        if (!streamRunning) return;
        streamRunning = false;
        sendingInFlight = false;
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = null;
        if (sessionTicker) clearInterval(sessionTicker);
        sessionTicker = null;

        if (ws) {
          try {
            ws.close();
          } catch (_err) {}
          ws = null;
        }
        if (video.srcObject) {
          video.srcObject.getTracks().forEach((t) => t.stop());
          video.srcObject = null;
        }

        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        setStatus("IDLE", false, true);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        muteBtn.disabled = true;
      }

      let lastResult = null;
      function drawLoop() {
        if (!streamRunning) return;
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (lastResult && lastResult.keypoints) {
          const status = String(lastResult.status || "").toUpperCase();
          const isAlarm = status === "ALARM" || status === "BAD";
          drawSkeleton(lastResult.keypoints, isAlarm);
        }
        requestAnimationFrame(drawLoop);
      }

      startBtn.addEventListener("click", () => {
        startTraining().catch((err) => {
          console.error(err);
          setStatus("INIT_FAILED", true, true);
          startBtn.disabled = false;
          stopBtn.disabled = true;
        });
      });
      stopBtn.addEventListener("click", stopTraining);
      muteBtn.addEventListener("click", async () => {
        try {
          await ensureAudioReady();
        } catch (_err) {}
        isMuted = !isMuted;
        updateMuteUi();
      });

      initChart();
      updateMuteUi();
    </script>
  </body>
</html>
